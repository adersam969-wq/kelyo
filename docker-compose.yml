services:
  postgres:
    image: postgres:16-alpine
    container_name: kelyo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kelyo
      POSTGRES_PASSWORD: kelyo_dev_password
      POSTGRES_DB: kelyo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelyo -d kelyo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kelyo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for KYC document storage (S3-compatible, local dev)
  minio:
    image: minio/minio:latest
    container_name: kelyo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kelyo_minio
      MINIO_ROOT_PASSWORD: kelyo_minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mailhog for catching emails in dev (OTP fallback, receipts)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: kelyo-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:
